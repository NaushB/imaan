<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naush & Imaan's (2nd) Hangout aka Date</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #fdf6ee;
    --warm: #f5e6d3;
    --blush: #e8c4a0;
    --rose: #c97d5a;
    --deep: #7a3e2a;
    --text: #3d2314;
    --soft: #a0614a;
  }

  body {
    background-color: var(--cream);
    font-family: 'Lora', serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    animation: fadeInPage 1.5s ease both; /* Smooth fade in */
  }

  @keyframes fadeInPage {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 60px 0 40px;
    animation: fadeUp 1s ease both;
  }

  .faces {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0;
    margin-bottom: 32px;
    position: relative;
  }

  .face-wrap { position: relative; }

  .face-wrap.naush {
    z-index: 2;
    transform: rotate(-4deg) translateX(18px);
    animation: fadeUp 1s 0.2s ease both;
  }

  .face-wrap.imaan {
    z-index: 1;
    transform: rotate(4deg) translateX(-18px);
    animation: fadeUp 1s 0.4s ease both;
  }

  .face-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid var(--cream);
    box-shadow: 0 8px 32px rgba(122,62,42,0.18);
    display: block;
    object-fit: cover;
  }

  .face-label {
    text-align: center;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--soft);
    margin-top: 8px;
  }

  .heart-badge {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 26px;
    animation: heartbeat 1.6s ease infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.2); }
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 7vw, 42px);
    font-weight: 700;
    color: var(--deep);
    line-height: 1.2;
    margin-bottom: 10px;
    animation: fadeUp 1s 0.5s ease both;
  }

  .hero-title em { font-style: italic; color: var(--rose); }

  .hero-sub {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--soft);
    animation: fadeUp 1s 0.7s ease both;
    margin-bottom: 28px;
  }

  /* ── MUSIC PLAYER ── */
  .music-section {
    animation: fadeUp 1s 0.9s ease both;
    margin-bottom: 8px;
    text-align: center;
  }

  .music-label {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--soft);
    margin-bottom: 15px;
  }

  .play-button-style {
    background: var(--rose);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 20px;
    font-family: 'Lora', serif;
    font-size: 15px;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    box-shadow: 0 4px 15px rgba(122,62,42,0.2);
    transition: transform 0.2s, background 0.2s;
  }

  .play-button-style:hover {
    transform: scale(1.05);
    background: var(--deep);
  }

  .phone-deer {
    display: block;
    max-width: 140px;
    height: auto;
    margin: 20px auto 0;
    opacity: 1;
    border-radius: 12px; /* Makes the image look polished */
    box-shadow: 0 4px 12px rgba(122,62,42,0.15); /* Soft shadow */
  }

  /* ── DIVIDER ── */
  .divider {
    text-align: center;
    margin: 40px 0 32px;
    color: var(--blush);
    font-size: 22px;
    letter-spacing: 10px;
    animation: fadeUp 1s 1s ease both;
  }

  /* ── ITINERARY ── */
  .itinerary-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--deep);
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 1s 1.1s ease both;
  }

  .stop {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    animation: fadeUp 0.8s ease both;
    background: white;
    border-radius: 20px;
    padding: 22px 20px;
    box-shadow: 0 2px 20px rgba(122,62,42,0.07);
    border: 1px solid rgba(232,196,160,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    text-decoration: none;
    color: inherit;
  }

  .stop:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(122,62,42,0.13);
  }

  .stop-num {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--warm);
    border: 2px solid var(--blush);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--deep);
    margin-top: 2px;
  }

  .stop-body { flex: 1; }

  .stop-emoji { font-size: 20px; margin-bottom: 4px; }

  .stop-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--deep);
    margin-bottom: 4px;
  }

  .stop-desc {
    font-size: 14px;
    color: var(--soft);
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 10px;
  }

  .stop-address {
    font-size: 12px;
    color: var(--blush);
    margin-bottom: 10px;
    font-style: normal;
  }

  .map-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--rose);
    color: white;
    font-family: 'Lora', serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    text-decoration: none;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
  }

  .map-btn:hover { background: var(--deep); }

  /* ── FINAL NOTE ── */
  .final-note {
    text-align: center;
    margin-top: 48px;
    padding: 32px 24px;
    background: linear-gradient(135deg, #fdf0e8, #f9e4d4);
    border-radius: 24px;
    border: 1px solid var(--blush);
    animation: fadeUp 1s ease both;
  }

  .final-note p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--deep);
    line-height: 1.7;
  }

  .final-note .tiny {
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--soft);
    margin-top: 12px;
    font-style: normal;
  }

  /* ── FULL ROUTE BTN ── */
  .route-btn-wrap {
    text-align: center;
    margin: 32px 0 0;
  }

  .route-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--deep);
    color: white;
    font-family: 'Lora', serif;
    font-size: 15px;
    padding: 14px 28px;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 4px 18px rgba(122,62,42,0.22);
    transition: background 0.2s, transform 0.2s;
  }

  .route-btn:hover {
    background: var(--rose);
    transform: translateY(-2px);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stop:nth-child(1) { animation-delay: 0.1s; }
  .stop:nth-child(2) { animation-delay: 0.2s; }
  .stop:nth-child(3) { animation-delay: 0.3s; }
  .stop:nth-child(4) { animation-delay: 0.4s; }
  .stop:nth-child(5) { animation-delay: 0.5s; }

  /* floating background elements */
  .petal {
    position: fixed;
    pointer-events: none;
    font-size: 18px;
    animation: float linear infinite;
    opacity: 0.5;
    z-index: 0;
  }
  @keyframes float {
    0%   { transform: translateY(-30px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
